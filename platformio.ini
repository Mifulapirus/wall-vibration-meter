; Wall Vibration Meter
; Reuses the Activity Dice electronics:
;   - ESP32-C3 SuperMini
;   - BMI160 6-axis IMU (I2C @ 0x68)  -> accelerometer used as vibration sensor
;   - GC9A01A 240x240 round display (SPI, CS=GPIO7, DC=GPIO10)
;   - 16-LED NeoPixel ring (GPIO3)    -> severity meter
;
; Measures wall vibration (e.g. from rooftop AC compressors):
;   RMS acceleration, peak, ISO-10816-style RMS velocity (mm/s),
;   dominant frequency and a live FFT spectrum, shown on-device and
;   on a web dashboard over WiFi.

[env:esp32c3_supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -I include
    -Os

board_build.partitions = custom_partition.csv
board_build.filesystem = littlefs

lib_ldf_mode = chain
lib_deps =
    ArduinoJson
    WiFiManager
    https://github.com/adafruit/Adafruit-GFX-Library
    https://github.com/adafruit/Adafruit_GC9A01A
    adafruit/Adafruit NeoPixel
