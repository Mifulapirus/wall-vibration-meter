# Reference reverse-proxy config for wallvibe.thehomelab.dev.
# Matches the "plain HTTP port + external Nginx" pattern used by your other
# homelab services. Adjust cert paths / upstream host to your setup.
#
# If Nginx runs on the same host as the container, upstream is 127.0.0.1:5006.
# If Nginx is itself containerised on the same Docker network, use the service
# name instead:  proxy_pass http://wallvibe:5006;

upstream wallvibe_upstream {
    server 127.0.0.1:5006;
}

server {
    listen 80;
    server_name wallvibe.thehomelab.dev;
    # Let your ACME/redirect setup handle 80->443 as it does for other services.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name wallvibe.thehomelab.dev;

    ssl_certificate     /etc/letsencrypt/live/wallvibe.thehomelab.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wallvibe.thehomelab.dev/privkey.pem;

    # Device pushes are ~2 KB JSON, but browser noise-log imports (multi-day
    # CSV/XLSX) need real headroom, so allow 20m to avoid nginx 413s.
    client_max_body_size 20m;

    location / {
        proxy_pass         http://wallvibe_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
