# wallvibe.thehomelab.dev
# Browsers are forced to HTTPS. Devices push metrics over plain HTTP on port 80
# to /api/ingest, which avoids a TLS handshake on the memory-constrained
# ESP32-C3 (the display canvas leaves too little heap for mbedTLS). Same
# "devices on HTTP, browsers on HTTPS" split as activitydice.conf.
#
# The 443 block below is as certbot generated it. For a *fresh* install (before
# a cert exists), use deploy/install-root.sh, which starts HTTP-only and lets
# certbot add the 443 block.

server {
    server_name wallvibe.thehomelab.dev;

    # 20m so browser noise-log imports (multi-day CSV/XLSX) aren't 413'd.
    # Device ingest itself is tiny; this only affects browser uploads on 443.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:5006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wallvibe.thehomelab.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wallvibe.thehomelab.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name wallvibe.thehomelab.dev;

    client_max_body_size 20m;

    # Devices: allow the API and firmware downloads over plain HTTP (no TLS
    # handshake on the memory-constrained MCU). Browsers still use HTTPS.
    location /api/ {
        proxy_pass http://127.0.0.1:5006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /firmware/ {
        proxy_pass http://127.0.0.1:5006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;      # firmware image can take a moment
    }

    # Browsers: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}
